body {
  min-height: 100vh;
  background: #1a0a2e;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Nunito', sans-serif;
  overflow: hidden;
  cursor: default;
}

/* Floating hearts background */
.hearts-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.heart-float {
  position: absolute;
  font-size: 1.5rem;
  animation: floatUp linear infinite;
  opacity: 0;
}

@keyframes floatUp {
  0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10%  { opacity: 0.6; }
  90%  { opacity: 0.4; }
  100% { transform: translateY(-10vh) rotate(20deg); opacity: 0; }
}

/* Main button */
.center {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2rem;
}

.btn {
  position: relative;
  background: linear-gradient(135deg, #ff6eb4, #ff3e8a, #ff6eb4);
  background-size: 200% 200%;
  animation: gradientShift 2s ease infinite;
  border: none;
  border-radius: 60px;
  padding: 28px 60px;
  font-family: 'Nunito', sans-serif;
  font-size: 2rem;
  font-weight: 900;
  color: #fff;
  cursor: pointer;
  box-shadow:
    0 0 40px #ff3e8a88,
    0 8px 30px #ff3e8a55,
    inset 0 2px 0 rgba(255,255,255,0.3);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  letter-spacing: 0.5px;
}

.btn::before {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 63px;
  background: linear-gradient(135deg, #ffb3d9, #ff3e8a, #c724b1);
  z-index: -1;
  filter: blur(8px);
  opacity: 0.8;
  animation: gradientShift 2s ease infinite;
}

@keyframes gradientShift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.btn:hover {
  transform: scale(1.07) translateY(-3px);
  box-shadow:
    0 0 60px #ff3e8aaa,
    0 12px 40px #ff3e8a77,
    inset 0 2px 0 rgba(255,255,255,0.3);
}

.btn:active {
  transform: scale(0.97);
}

.subtitle {
  color: rgba(255,200,230,0.6);
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0.5; }
  50%       { opacity: 1; }
}

/* Overlay */
.overlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  opacity: 0;
}

.overlay.active {
  pointer-events: all;
}

/* Pink burst background */
.burst {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, #ff3e8a, #c724b1, #1a0a2e);
  opacity: 0;
  transform: scale(0);
  border-radius: 50%;
  transition: none;
}

.overlay.active .burst {
  animation: burstIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

@keyframes burstIn {
  0%   { transform: scale(0); opacity: 1; border-radius: 50%; }
  60%  { transform: scale(1.2); opacity: 1; border-radius: 0; }
  100% { transform: scale(1); opacity: 1; border-radius: 0; }
}

/* Hamster sticker */
.sticker-wrap {
  position: relative;
  z-index: 2;
  opacity: 0;
  transform: scale(0) rotate(-15deg);
}

.overlay.active .sticker-wrap {
  animation: stickerPop 0.6s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

@keyframes stickerPop {
  0%   { transform: scale(0) rotate(-15deg); opacity: 0; }
  60%  { transform: scale(1.15) rotate(5deg); opacity: 1; }
  80%  { transform: scale(0.95) rotate(-2deg); opacity: 1; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

.sticker-img {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
  filter: drop-shadow(0 0 60px rgba(255,62,138,0.9)) drop-shadow(0 0 120px rgba(255,180,220,0.5));
  animation: wobble 1.2s 0.9s ease-in-out infinite;
}

@keyframes wobble {
  0%, 100% { transform: scale(1) rotate(0deg); }
  25%       { transform: scale(1.04) rotate(2deg); }
  75%       { transform: scale(0.97) rotate(-2deg); }
}

/* Flying hearts on overlay */
.fly-heart {
  position: absolute;
  font-size: 2.5rem;
  animation: flyHeart 1.2s ease-out forwards;
  pointer-events: none;
  z-index: 3;
}

@keyframes flyHeart {
  0%   { transform: translate(0,0) scale(0); opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(1.5); opacity: 0; }
}

/* Close hint */
.close-hint {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.5);
  font-family: 'Nunito', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 1px;
  z-index: 3;
  opacity: 0;
  animation: none;
}

.overlay.active .close-hint {
  animation: fadeInHint 0.5s 1.2s forwards;
}

@keyframes fadeInHint {
  to { opacity: 0.5; }
}

/* Sparkles */
.sparkle {
  position: absolute;
  width: 12px;
  height: 12px;
  z-index: 3;
  animation: sparklePop 0.8s ease-out forwards;
}

.sparkle::before, .sparkle::after {
  content: '';
  position: absolute;
  background: #fff;
  border-radius: 2px;
}
.sparkle::before { width: 100%; height: 3px; top: 50%; transform: translateY(-50%); }
.sparkle::after  { width: 3px; height: 100%; left: 50%; transform: translateX(-50%); }

@keyframes sparklePop {
  0%   { transform: translate(var(--sx), var(--sy)) scale(0) rotate(0deg); opacity: 1; }
  50%  { transform: translate(var(--sx), var(--sy)) scale(1.5) rotate(45deg); opacity: 1; }
  100% { transform: translate(var(--sx), var(--sy)) scale(0) rotate(90deg); opacity: 0; }
}

  <p class="close-hint">нажми, чтобы закрыть 🩷</p>

<script>
  // Background floating hearts
  const heartsBg = document.getElementById('heartsBg');
  const emojis = ['💕','💖','💗','💓','💞','🩷','💝','✨'];

  for (let i = 0; i < 20; i++) {
    const h = document.createElement('div');
    h.className = 'heart-float';
    h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    h.style.left = Math.random() * 100 + 'vw';
    h.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
    h.style.animationDuration = (6 + Math.random() * 8) + 's';
    h.style.animationDelay = (Math.random() * 8) + 's';
    heartsBg.appendChild(h);
  }

  const btn = document.getElementById('mainBtn');
  const overlay = document.getElementById('overlay');

  btn.addEventListener('click', () => {
    overlay.classList.add('active');
    overlay.style.opacity = '1';
    spawnHearts();
    spawnSparkles();
  });

  overlay.addEventListener('click', () => {
    overlay.style.opacity = '0';
    overlay.style.transition = 'opacity 0.4s ease';
    setTimeout(() => {
      overlay.classList.remove('active');
      overlay.style.transition = '';
      // Reset children for re-animation
      const burst = overlay.querySelector('.burst');
      const sw = overlay.querySelector('.sticker-wrap');
      const hint = overlay.querySelector('.close-hint');
      burst.style.animation = 'none';
      sw.style.animation = 'none';
      hint.style.animation = 'none';
      void burst.offsetWidth;
      burst.style.animation = '';
      sw.style.animation = '';
      hint.style.animation = '';
      // Remove dynamic hearts/sparkles
      overlay.querySelectorAll('.fly-heart,.sparkle').forEach(el => el.remove());
    }, 400);
  });

  function spawnHearts() {
    for (let i = 0; i < 16; i++) {
      setTimeout(() => {
        const h = document.createElement('div');
        h.className = 'fly-heart';
        h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        h.style.left = (20 + Math.random() * 60) + 'vw';
        h.style.top  = (20 + Math.random() * 60) + 'vh';
        const angle = Math.random() * Math.PI * 2;
        const dist  = 80 + Math.random() * 150;
        h.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
        h.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
        h.style.animationDelay = (Math.random() * 0.4) + 's';
        overlay.appendChild(h);
        setTimeout(() => h.remove(), 1600);
      }, i * 60);
    }
  }

  function spawnSparkles() {
    for (let i = 0; i < 12; i++) {
      setTimeout(() => {
        const s = document.createElement('div');
        s.className = 'sparkle';
        s.style.left = (10 + Math.random() * 80) + 'vw';
        s.style.top  = (10 + Math.random() * 80) + 'vh';
        s.style.setProperty('--sx', '0px');
        s.style.setProperty('--sy', '0px');
        s.style.animationDelay = (Math.random() * 0.5) + 's';
        overlay.appendChild(s);
        setTimeout(() => s.remove(), 1200);
      }, i * 80);
    }
  }
</script>

</body>
</html>
